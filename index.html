<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gateway to Heaven</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <div class="background"></div>
  <div class="cursor-glow"></div>

  <header>

    <div class="logo">
      GATEWAY TO HEAVEN
    </div>

    <nav>
      <a href="#">Home</a>
      <a href="assignments.html">Assignments</a>
      <a href="#">About</a>
    </nav>

  </header>

  <section class="hero">

    <div class="hero-left">

      <p class="tag">
        PERSONAL SPACE • THOUGHTS • CREATIONS
      </p>

      <h1>
        Gateway<br>
        to Heaven.
      </h1>

      <p class="description">
        Somewhere between silence and imagination,
        this space slowly gathers thoughts, experiments,
        unfinished dreams and fragments of creation.
      </p>

      <div class="buttons">

        <a href="assignments.html">
          <button class="primary">
            Enter
          </button>
        </a>

        <button class="secondary">
          About
        </button>

      </div>

    </div>

    <div class="hero-right">

      <img
        src="images/luffy.jpg"
        alt="Luffy"
        class="luffy">

    </div>

  </section>

  <script>

    const glow = document.querySelector(".cursor-glow");

    document.addEventListener("mousemove", (e) => {

      glow.style.left = e.clientX + "px";
      glow.style.top = e.clientY + "px";

    });

  </script>

</body>

</html>
